baseURL = "https://purefitshop.github.io/"
languageCode = "ko-kr"
title = "purefitshop 쇼핑 블로그"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
summaryLength = 35

[pagination]
pagerSize = 12

[outputs]
home = ["HTML", "RSS", "JSON"]

[markup]
	[markup.goldmark]
		[markup.goldmark.renderer]
			unsafe = true

[minify]
disableXML = false
minifyOutput = true

[sitemap]
changefreq = "daily"
priority = 0.7
filename = "sitemap.xml"

[permalinks]
posts = "/posts/:slug/"

[params]
defaultTheme = "auto"
disableThemeToggle = false
ShowShareButtons = true
ShowReadingTime = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowToc = true
TocOpen = false
env = "production"
description = "건강하고 아름다운 삶을 위한 퓨어핏 뷰티 & 헬스케어 쇼핑 블로그입니다. 천연 성분 화장품, 건강기능식품, 웰니스 아이템을 큐레이션해 드립니다"
keywords = ["천연화장품", "헬스케어", "뷰티", "건강기능식품", "웰니스"]
images = ["/images/og-default.webp"]

# Search engine verification (set only when needed)
googleSiteVerification = "wYI691jLJJcCGDUHEKLHiMCiG6RGFSbe9-rfyCSjioQ"
naverSiteVerification = "d7cd863f7edfb63adf51ddfa20697220690dd4db"
bingSiteVerification = ""
yandexSiteVerification = ""

[params.homeInfoParams]
Title = "자연에서 온 순수함, 퓨어핏 뷰티 & 헬스케어 쇼핑"
Content = "내 몸에 순수하고 좋은 것만 담았습니다. 퓨어핏에서는 엄격하게 선별한 천연 뷰티 제품과 건강기능식품을 소개합니다. 피부부터 건강까지 자연의 힘으로 가꾸는 웰니스 라이프를 퓨어핏과 함께 시작해보세요."

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 2
keys = ["title", "permalink", "summary", "content"]

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 5

[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "categories"
name = "Categories"
url = "/categories/"
weight = 20

[[menu.main]]
identifier = "tags"
name = "Tags"
url = "/tags/"
weight = 30
